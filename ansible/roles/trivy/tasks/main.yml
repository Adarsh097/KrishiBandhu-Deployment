---
- name: Fix apt mirror issues
  block:
    - name: Clean apt cache
      command: apt-get clean

    - name: Remove apt lists
      command: rm -rf /var/lib/apt/lists/*

    - name: Update apt cache with retry
      apt:
        update_cache: yes
      retries: 3
      delay: 10

- name: Install dependencies
  apt:
    name:
      - wget
      - apt-transport-https
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Add Trivy GPG key
  shell: |
    wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
    | gpg --dearmor -o /usr/share/keyrings/trivy.gpg
  args:
    creates: /usr/share/keyrings/trivy.gpg

- name: Add Trivy repository
  copy:
    dest: /etc/apt/sources.list.d/trivy.list
    content: |
      deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Trivy
  apt:
    name: trivy
    state: present