apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  MONGODB_URI: "mongodb_url"
  JWT_SECRET: "jwt_secret"
  JWT_REFRESH_SECRET: "jwt_ref_secret"
  EMAIL_PASSWORD: "password"
  GEMINI_API_KEY: "gemini_api_key"
  WEATHER_API_KEY: "weather_api_key"
  MARKET_PRICE_API_KEY: "market_api_key"
  GOV_SCHEME_API_KEY: "gov_scheme_api_key"
