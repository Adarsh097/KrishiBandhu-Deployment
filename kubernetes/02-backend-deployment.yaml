apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment
  namespace: krishibandhu
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: adarsh5559/krishibandhu-backend:6
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef: 
                name: backend-config
            - secretRef:
                name: backend-secret  
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"