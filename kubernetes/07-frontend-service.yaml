apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: krishibandhu
  labels:
    app: frontend

spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007   # You can choose any port between 30000–32767